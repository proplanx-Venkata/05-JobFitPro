name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test, Type-check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: jobfitpro

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jobfitpro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Stub env vars so Next.js build doesn't fail on missing values
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          NEXT_PUBLIC_APP_URL: https://placeholder.com
          QUOTA_FREE_LIMIT: "2"
          QUOTA_PAID_MONTHLY_LIMIT: "30"
          ADMIN_EMAILS: admin@example.com
